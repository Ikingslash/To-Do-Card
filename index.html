<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>

        <article data-testid="test-profile-card" class="card">

            <!-- HEADER -->
            <header class="card-title">
                <h2 data-testid="test-todo-title" id="title">Study for Exams</h2>

                <div class="card-priority">
                    <span id="priority-indicator">🔴</span>
                    <span data-testid="test-todo-priority" id="priority">High</span>
                </div>
            </header>

            <!-- DESCRIPTION -->
            <div data-testid="test-todo-collapsible-section" class="collapsible-section">
                <p data-testid="test-todo-description" id="description" class="card-description">
                    Revise thoroughly for upcoming math and science exams, including algebraic expressions and molecular
                    structures.
                </p>

                <button data-testid="test-todo-expand-toggle" id="expand-toggle" aria-label="Expand description">
                    Show More
                </button>
            </div>

            <!-- DATES -->
            <div class="dates">
                <time data-testid="test-todo-due-date" id="due-date" datetime="2026-03-01T18:00:00Z">
                    Due March 1, 2026
                </time>

                <div data-testid="test-todo-time-remaining" id="time-remaining"></div>

                <div data-testid="test-todo-overdue-indicator" id="overdue-indicator"></div>
            </div>

            <!-- STATUS -->
            <span data-testid="test-todo-status" id="status">In Progress</span>

            <!-- CHECKBOX -->
            <label class="checkbox">
                <input type="checkbox" id="toggle" />
                <span>Mark as complete</span>
            </label>

            <!-- ACTIONS -->
            <div class="card-actions">
                <button id="edit-button">Edit</button>
                <button id="delete-button">Delete</button>
            </div>

            <!-- EDIT FORM -->
            <form id="edit-form" class="edit-form">
                <input id="edit-title" placeholder="Title">
                <textarea id="edit-description"></textarea>

                <select id="edit-status">
                    <option>Pending</option>
                    <option>In Progress</option>
                    <option>Done</option>
                </select>

                <select id="edit-priority">
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select>

                <input type="date" id="edit-due-date">

                <button id="save-button">Save</button>
                <button id="cancel-button" type="button">Cancel</button>
            </form>

        </article>

    </main>

    <script src="script.js"></script>
</body>

</html>
