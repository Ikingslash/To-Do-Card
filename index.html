<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>

        <!-- todo card -->
        <article data-testid="test-todo-card" class="card">

            <!-- header -->
            <header class="card-title">
                <h2 data-testid="test-todo-title" id="title">Study for Exams</h2>

                <!-- priority -->
                <span data-testid="test-todo-priority" class="card-priority" aria-label="High Priority">
                    High
                </span>
            </header>

            <!-- description -->
            <p data-testid="test-todo-description" class="card-description">
                Prepare for the upcoming math and science exams.
            </p>

            <!-- dates -->
            <div class="dates">

                <!-- due date -->
                <time data-testid="test-todo-due-date" datetime="2026-03-01T18:00:00Z" id="due-date">
                    Due March 1, 2026
                </time>

                <!-- time remaining -->
                <div data-testid="test-todo-time-remaining" id="time-remaining" aria-live="polite"></div>
            </div>

            <!-- status -->
            <span data-testid="test-todo-status" class="card-status" id="status" aria-label="In Progress">
                In Progress
            </span>

            <!-- tags -->
            <ul data-testid="test-todo-tags" role="list" class="card-tasks">

                <li data-testid="test-todo-tag-work" class="tag">Work</li>

                <li data-testid="test-todo-tag-urgent" class="tag">Urgent</li>

            </ul>

            <!-- checkbox -->
            <label class="checkbox">
                <input type="checkbox" role="checkbox" data-testid="test-todo-complete-toggle" id="toggle" />
                <span>Mark as complete</span>
            </label>

            <!-- actions -->
            <div class="card-actions">

                <button data-testid="test-todo-edit-button" class="edit-button" id="edit-button">
                    Edit
                </button>

                <button data-testid="test-todo-delete-button" class="delete-button" id="delete-button">
                    Delete
                </button>

            </div>

        </article>

    </main>

    <script src="script.js"></script>
</body>

</html>
