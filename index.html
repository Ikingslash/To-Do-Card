<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>

        <article data-testid="test-todo-card" class="card">

            <!-- HEADER -->
            <header class="card-title">
                <h2 data-testid="test-todo-title" id="title">Study for Exams</h2>

                <div class="card-priority">
                    <span id="priority-indicator" data-testid="test-todo-priority-indicator">🔴</span>
                    <span data-testid="test-todo-priority" id="priority">High</span>
                </div>
            </header>

            <!-- DESCRIPTION AND COLLAPSIBLE SECTION     -->
            <div data-testid="test-todo-collapsible-section" class="collapsible-section">
                <p data-testid="test-todo-description" id="description" class="card-description">
                    Revise thoroughly for upcoming math and science exams, including algebraic expressions and molecular
                    <span id="dots">...</span>
                    <span id="more" class="hidden">
                        structures and continue practicing past questions and reviewing weak areas until confident.
                    </span>
                </p>
                <!-- EXPAND BUTTON -->
                <button data-testid="test-todo-expand-toggle" id="expand-toggle" aria-label="Expand description">
                    Show More
                </button>
            </div>

            <!-- CARD TAGS -->
            <ul data-testid="test-todo-tags" class="tags" role="list">
                <li data-testid="test-todo-tag-study">Study</li>
                <li data-testid="test-todo-tag-exams">Exams</li>
            </ul>
            <!-- DATES -->
            <div class="dates">
                <time data-testid="test-todo-due-date" id="due-date" datetime="2026-03-01T18:00:00Z">

                </time>

                <div data-testid="test-todo-time-remaining" id="time-remaining"></div>

                <div data-testid="test-todo-overdue-indicator" id="overdue-indicator"></div>
            </div>

            <!-- STATUS -->
            <span data-testid="test-todo-status" id="status" class="status-bar">Pending</span>

            <!-- CHECKBOX -->
            <label class="checkbox">
                <input type="checkbox" data-testid="test-todo-complete-toggle" id="toggle" />
                <span>Mark as complete</span>
            </label>

            <!-- ACTIONS -->
            <div class="card-actions" role="list">
                <button data-testid="test-todo-edit-button" id="edit-button" class="edit-button">Edit</button>
                <button data-testid="test-todo-delete-button" id="delete-button" class="delete-button">Delete</button>
            </div>

            <!-- EDIT FORM -->
            <form id="edit-form" class="edit-form" data-testid="test-todo-edit-form">
                <input id="edit-title" placeholder="Title" data-testid="test-todo-edit-title-input">
                <textarea id="edit-description" data-testid="test-todo-edit-description-input"></textarea>

                <select id="edit-status" data-testid="test-todo-status-control">
                    <option>Pending</option>
                    <option>In Progress</option>
                    <option>Done</option>
                </select>

                <select id="edit-priority" data-testid="test-todo-edit-priority-select">
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select>

                <input type="date" id="edit-due-date" data-testid="test-todo-edit-due-date-input">

                <button id="save-button" type="button" data-testid="test-todo-save-button"
                    class="save-button">Save</button>
                <button id="cancel-button" type="button" data-testid="test-todo-cancel-button"
                    class="cancel-button">Cancel</button>
            </form>

        </article>

    </main>

    <script src="script.js"></script>
</body>

</html>
